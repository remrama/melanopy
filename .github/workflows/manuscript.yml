name: Manuscript

# Build the manuscript PDF (pdflatex + biber, via latexmk) and upload it as a downloadable artifact.
# Runs only when something under manuscript/ (or this workflow) changes.

on:
  push:
    branches: [main]
    paths:
      - "manuscript/**"
      - ".github/workflows/manuscript.yml"
  pull_request:
    paths:
      - "manuscript/**"
      - ".github/workflows/manuscript.yml"

permissions:
  contents: read

concurrency:
  group: manuscript-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pdf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Build PDF (pdflatex + biber via latexmk)
        uses: xu-cheng/latex-action@v3
        with:
          working_directory: manuscript
          root_file: main.tex
      - uses: actions/upload-artifact@v7
        with:
          name: manuscript
          path: manuscript/main.pdf
          if-no-files-found: error
